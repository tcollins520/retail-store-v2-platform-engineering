apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "orders.configMapName" . }}
data:
  RETAIL_ORDERS_PERSISTENCE_PROVIDER: {{ .Values.app.persistence.provider | quote }}
  RETAIL_ORDERS_PERSISTENCE_ENDPOINT: {{ .Values.database.endpoint | quote }}
  RETAIL_ORDERS_PERSISTENCE_NAME: {{ .Values.app.persistence.database | quote }}

  RETAIL_ORDERS_MESSAGING_PROVIDER: {{ .Values.messaging.provider | quote }}

  {{- if eq .Values.messaging.provider "sqs" }}
  RETAIL_ORDERS_MESSAGING_SQS_TOPIC: {{ .Values.messaging.sqs.topic | quote }}
  {{- end }}